<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MS2 MQTT Monitor</title>
    <style>
      :root {
        --bg-1: #fff6e8;
        --bg-2: #ffe5c2;
        --ink: #2a1f16;
        --accent: #c73b1d;
        --accent-2: #187a55;
        --card: #fffaf2;
        --line: #e7d8c2;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Segoe UI", "Trebuchet MS", sans-serif;
        color: var(--ink);
        background: radial-gradient(1200px 600px at 10% -10%, #ffd8a6 0%, transparent 60%),
          radial-gradient(1000px 600px at 90% 120%, #ffc9a8 0%, transparent 60%), linear-gradient(145deg, var(--bg-1), var(--bg-2));
        min-height: 100vh;
      }

      .wrap {
        max-width: 1100px;
        margin: 0 auto;
        padding: 24px 16px 40px;
      }

      .hero {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 18px 20px;
        box-shadow: 0 10px 30px rgba(70, 30, 10, 0.08);
      }

      .hero h1 {
        margin: 0 0 8px;
        font-size: clamp(1.5rem, 3vw, 2.2rem);
      }

      .meta {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
        font-size: 0.95rem;
      }

      .badge {
        padding: 6px 10px;
        border-radius: 999px;
        background: #fff;
        border: 1px solid var(--line);
      }

      .grid {
        margin-top: 14px;
        display: grid;
        gap: 14px;
        grid-template-columns: 1fr;
      }

      @media (min-width: 900px) {
        .grid {
          grid-template-columns: 0.95fr 1.05fr;
        }
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 14px;
      }

      .card h2 {
        margin: 0 0 10px;
        font-size: 1.05rem;
      }

      .status-item {
        padding: 10px;
        border: 1px solid var(--line);
        border-radius: 12px;
        margin-bottom: 8px;
        background: #fff;
      }

      .status-item:last-child {
        margin-bottom: 0;
      }

      .state-online {
        color: var(--accent-2);
        font-weight: 700;
      }

      .state-offline {
        color: var(--accent);
        font-weight: 700;
      }

      .event-table {
        width: 100%;
        border-collapse: collapse;
        font-size: 0.9rem;
      }

      .event-table th,
      .event-table td {
        text-align: left;
        border-bottom: 1px solid var(--line);
        padding: 8px 6px;
        vertical-align: top;
      }

      .small {
        font-size: 0.82rem;
        opacity: 0.9;
      }

      .pill {
        display: inline-block;
        font-size: 0.75rem;
        padding: 2px 8px;
        border-radius: 999px;
        border: 1px solid var(--line);
        background: #fff;
      }

      .muted {
        opacity: 0.75;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <section class="hero">
        <h1>Pizza Service: MQTT Monitor (MS2)</h1>
        <div class="meta">
          <span class="badge">API: <strong>/events</strong> + <strong>/status</strong></span>
          <span class="badge">Refresh: <strong>alle 2 Sekunden</strong></span>
          <span class="badge">Zeitzone: <strong id="tz"></strong></span>
        </div>
      </section>

      <section class="grid">
        <article class="card">
          <h2>Service-Status</h2>
          <div id="status-list" class="muted">Lade Statusdaten...</div>
        </article>

        <article class="card">
          <h2>Letzte Events</h2>
          <div id="events-wrap" class="muted">Lade Eventdaten...</div>
        </article>
      </section>
    </div>

    <script>
      const statusList = document.getElementById("status-list");
      const eventsWrap = document.getElementById("events-wrap");
      const tz = document.getElementById("tz");
      tz.textContent = Intl.DateTimeFormat().resolvedOptions().timeZone || "unbekannt";

      function esc(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function formatTs(ts) {
        if (!ts) return "-";
        const d = new Date(ts);
        if (Number.isNaN(d.getTime())) return esc(ts);
        return d.toLocaleString("de-DE");
      }

      function renderStatus(services) {
        const entries = Object.entries(services || {});
        if (entries.length === 0) {
          statusList.innerHTML = "<span class='muted'>Noch keine Statusdaten empfangen.</span>";
          return;
        }

        statusList.innerHTML = entries
          .map(([name, s]) => {
            const css = s.status === "online" ? "state-online" : "state-offline";
            return `
              <div class="status-item">
                <div><strong>${esc(name)}</strong> ist <span class="${css}">${esc(s.status)}</span></div>
                <div class="small">Grund: ${esc(s.reason || "-")}</div>
                <div class="small">Zeitstempel: ${formatTs(s.zeitstempel)}</div>
                <div class="small">QoS: ${esc(s.qos)} | retained: ${esc(s.retained)}</div>
              </div>
            `;
          })
          .join("");
      }

      function renderEvents(events) {
        if (!Array.isArray(events) || events.length === 0) {
          eventsWrap.innerHTML = "<span class='muted'>Noch keine Events empfangen.</span>";
          return;
        }

        const rows = events
          .slice(0, 25)
          .map((e) => {
            const payload = JSON.stringify(e.payload);
            return `
              <tr>
                <td><span class="pill">${esc(e.type)}</span></td>
                <td>${esc(e.topic)}</td>
                <td>${esc(e.qos)}</td>
                <td>${esc(e.retained)}</td>
                <td class="small">${esc(payload)}</td>
                <td>${formatTs(e.receivedAt)}</td>
              </tr>
            `;
          })
          .join("");

        eventsWrap.innerHTML = `
          <table class="event-table">
            <thead>
              <tr>
                <th>Typ</th>
                <th>Topic</th>
                <th>QoS</th>
                <th>Retained</th>
                <th>Payload</th>
                <th>Empfangen</th>
              </tr>
            </thead>
            <tbody>${rows}</tbody>
          </table>
        `;
      }

      async function refresh() {
        try {
          const [statusRes, eventsRes] = await Promise.all([
            fetch("/status"),
            fetch("/events?limit=80")
          ]);

          const status = await statusRes.json();
          const events = await eventsRes.json();
          renderStatus(status.services);
          renderEvents(events.events);
        } catch (err) {
          const msg = esc(err && err.message ? err.message : String(err));
          statusList.innerHTML = `<span class="muted">Fehler beim Laden: ${msg}</span>`;
          eventsWrap.innerHTML = `<span class="muted">Fehler beim Laden: ${msg}</span>`;
        }
      }

      refresh();
      setInterval(refresh, 2000);
    </script>
  </body>
</html>
